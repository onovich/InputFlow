name: Optional Browser Matrix

on:
  workflow_dispatch:

jobs:
  optional-browser-matrix:
    name: Optional browser matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install browser matrix
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Optional browser matrix
        run: pnpm browser:test:all

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: optional-browser-matrix-test-results
          path: test-results/browser
          if-no-files-found: ignore
          retention-days: 7
